name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  APP_NAME: fastapi-react-app
  BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/fastapi-backend:latest
  FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/react-frontend:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3️⃣ Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 4️⃣ Login to AWS ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 5️⃣ Build & Push Backend Docker Image
    - name: Build, tag, and push backend image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: fastapi-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG backend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6️⃣ Build & Push Frontend Docker Image
    - name: Build, tag, and push frontend image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: react-frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f frontend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG frontend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    
    - name: Push DB secret to AWS Secrets Manager
      run: |
        aws secretsmanager create-secret \
        --name "${{ env.APP_NAME }}/db" \
        --secret-string '{
            "username":"${{ secrets.DB_USER }}",
            "password":"${{ secrets.DB_PASSWORD }}"
        }' \
        --region us-east-1 || \
        aws secretsmanager update-secret \
        --secret-id "${{ env.APP_NAME }}/db" \
        --secret-string '{
            "username":"${{ secrets.DB_USER }}",
            "password":"${{ secrets.DB_PASSWORD }}"
        }'     

    # 7️⃣ Initialize Terraform
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    # 8️⃣ Terraform Plan
    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -out=tfplan

    # 9️⃣ Terraform Apply
    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan