name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  APP_NAME: fastapi-react-app
  BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/fastapi-backend:latest
  FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/fastapi-frontend:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3️⃣ Set up Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 4️⃣ Login to AWS ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 5️⃣ Build & Push Backend Docker Image
    - name: Build, tag, and push backend image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: fastapi-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG backend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6️⃣ Build & Push Frontend Docker Image
    - name: Build, tag, and push frontend image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: fastapi-frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f frontend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG frontend/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    
    # 7️⃣ Create or update DB secret in AWS Secrets Manager
    - name: Create or update DB secret in AWS Secrets Manager
      env:
        AWS_REGION: us-east-1
        SECRET_NAME: fastapi-react-app/db
        SECRET_VALUE: '{"username":"${{ secrets.DB_USER }}","password":"${{ secrets.DB_PASSWORD }}"}'
      run: |
        aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" > /dev/null 2>&1 \
          && aws secretsmanager put-secret-value --region "$AWS_REGION" --secret-id "$SECRET_NAME" --secret-string "$SECRET_VALUE" \
          || aws secretsmanager create-secret --region "$AWS_REGION" --name "$SECRET_NAME" --secret-string "$SECRET_VALUE"

    # 8️⃣ Initialize Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init -input=false


    - name: Terraform Plan
      working-directory: ./terraform
      env:
        BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        DB_NAME: ${{ secrets.DB_NAME }}
        # ACM_CERTIFICATE_ARN removed
      run: |
        terraform plan -out=tfplan -input=false \
          -var="backend_image=$BACKEND_IMAGE" \
          -var="frontend_image=$FRONTEND_IMAGE" \
          -var="db_name=$DB_NAME" \
          # -var="acm_certificate_arn=$ACM_CERTIFICATE_ARN" (removed)

    # 9️⃣ Terraform Apply
    - name: Terraform Apply
      working-directory: ./terraform
      env:
        BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        DB_NAME: ${{ secrets.DB_NAME }}
        # ACM_CERTIFICATE_ARN removed
      run: |
        terraform apply -auto-approve tfplan